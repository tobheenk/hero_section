<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Pelajaran TIK Kelas 6 — Hero Section</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap');

  :root{
    --bg-deep:   #06241a;
    --bg-mid:    #0c3b28;
    --shield:    #14532d;
    --emerald:   #1fa366;
    --mint:      #7dffc4;
    --paper:     #eafff2;
    --dim:       #9fd8bb;
    --dot-red:   #e0505a;
    --dot-blue:  #3fa8d8;
    --dot-purple:#b06fdb;
    --dot-lime:  #8fd14f;
  }

  *{box-sizing:border-box; margin:0; padding:0;}

  html,body{
    background: var(--bg-deep);
    font-family:'Inter', sans-serif;
    overflow-x:hidden;
  }

  .hero{
    position:relative;
    min-height:480px;
    height:480px;
    display:flex;
    flex-direction:column;
    align-items:stretch;
    justify-content:center;
    background:
      radial-gradient(ellipse 900px 600px at 82% 15%, rgba(31,163,102,0.35), transparent 60%),
      radial-gradient(ellipse 700px 500px at 8% 92%, rgba(125,255,196,0.12), transparent 60%),
      linear-gradient(160deg, var(--bg-deep) 0%, var(--bg-mid) 55%, var(--bg-deep) 100%);
    isolation:isolate;
  }

  /* ---------- circuit backdrop ---------- */
  .circuit-svg{
    position:absolute; inset:0; width:100%; height:100%;
    opacity:0.22; z-index:0;
    mix-blend-mode:screen;
  }

  /* ---------- binary rain ---------- */
  .rain-col{
    position:absolute; top:-10%; font-family:'JetBrains Mono', monospace;
    font-size:13px; color:var(--mint); opacity:0; white-space:pre;
    line-height:1.5em; letter-spacing:0.05em;
    animation: fall linear infinite;
    text-shadow:0 0 6px rgba(125,255,196,0.6);
  }
  @keyframes fall{
    0%{ transform:translateY(-20%); opacity:0; }
    8%{ opacity:0.55; }
    92%{ opacity:0.35; }
    100%{ transform:translateY(120vh); opacity:0; }
  }

  /* scanlines */
  .scanlines{
    position:absolute; inset:0; z-index:1; pointer-events:none;
    background:repeating-linear-gradient(
      to bottom, rgba(255,255,255,0.025) 0px, rgba(255,255,255,0.025) 1px,
      transparent 2px, transparent 4px);
    mix-blend-mode:overlay;
  }

  /* ---------- top centered digital title ---------- */
  .top-title-wrap{
    position:relative; z-index:3;
    width:100%; padding: 14px 24px 0;
    display:flex; justify-content:center;
  }
  .top-title{
    position:relative;
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size:clamp(1.15rem, 2.6vw, 2.1rem);
    letter-spacing:0.02em;
    text-align:center;
    text-transform:uppercase;
    color:var(--paper);
    max-width:1000px;
    text-shadow:0 0 18px rgba(125,255,196,0.45), 0 0 46px rgba(31,163,102,0.35);
  }
  .top-title::before,
  .top-title::after{
    content:attr(data-text);
    position:absolute; left:0; top:0; width:100%;
    clip-path: inset(0 0 92% 0);
  }
  .top-title::before{
    color:var(--dot-blue);
    transform:translate(-2px,0);
    animation:glitch-a 5.5s infinite linear;
    mix-blend-mode:screen;
  }
  .top-title::after{
    color:var(--dot-red);
    transform:translate(2px,0);
    animation:glitch-b 6.5s infinite linear;
    mix-blend-mode:screen;
  }
  @keyframes glitch-a{
    0%,90%,100%{ clip-path:inset(0 0 92% 0); transform:translate(-2px,0); }
    91%{ clip-path:inset(20% 0 60% 0); transform:translate(-4px,1px); }
    93%{ clip-path:inset(55% 0 10% 0); transform:translate(3px,-1px); }
    95%{ clip-path:inset(5% 0 80% 0); transform:translate(-3px,0); }
  }
  @keyframes glitch-b{
    0%,88%,100%{ clip-path:inset(0 0 92% 0); transform:translate(2px,0); }
    89%{ clip-path:inset(65% 0 5% 0); transform:translate(4px,-1px); }
    92%{ clip-path:inset(10% 0 70% 0); transform:translate(-3px,1px); }
    96%{ clip-path:inset(40% 0 35% 0); transform:translate(3px,0); }
  }
  .top-title .cursor-blink{
    display:inline-block; width:0.5em; height:0.85em;
    background:var(--mint); margin-left:6px;
    box-shadow:0 0 10px var(--mint);
    animation:blink 1s step-end infinite;
    vertical-align:-0.08em;
  }
  .top-sub{
    text-align:center; margin-top:10px;
    font-family:'JetBrains Mono', monospace;
    font-size:12px; letter-spacing:0.28em; text-transform:uppercase;
    color:var(--dim);
  }

  /* ---------- content grid ---------- */
  .wrap{
    position:relative; z-index:3;
    width:100%; max-width:1180px; margin:0 auto;
    padding: 10px 40px 20px;
    display:grid;
    grid-template-columns: 1.15fr 0.85fr;
    gap:40px;
    align-items:center;
  }

  .logo-badge{
    width:58px; height:58px; margin-bottom:20px;
    border-radius:14px;
    background:rgba(255,255,255,0.92);
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 0 0 1px rgba(125,255,196,0.35), 0 8px 22px rgba(0,0,0,0.35);
    padding:7px;
  }
  .logo-badge img{ width:100%; height:100%; object-fit:contain; }

  .eyebrow{
    display:inline-flex; align-items:center; gap:10px;
    font-family:'JetBrains Mono', monospace;
    font-size:12.5px; letter-spacing:0.18em; text-transform:uppercase;
    color:var(--mint); margin-bottom:26px;
    padding:7px 14px 7px 10px;
    border:1px solid rgba(125,255,196,0.35);
    border-radius:999px; width:fit-content;
    background:rgba(31,163,102,0.08);
  }
  .eyebrow .px{
    width:7px; height:7px; border-radius:50%;
    background:var(--mint);
    box-shadow:0 0 8px var(--mint);
    animation:blink 1.6s ease-in-out infinite;
  }
  @keyframes blink{0%,100%{opacity:1;} 50%{opacity:0.25;}}

  h1{
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size:clamp(2.4rem, 4.6vw, 4.1rem);
    line-height:1.05;
    color:var(--paper);
    letter-spacing:-0.01em;
  }
  h1 .accent{
    background:linear-gradient(100deg, var(--mint), var(--emerald) 60%);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }

  .subtitle-row{
    display:flex; align-items:center; gap:14px;
    margin-top:22px;
  }
  .subtitle-row .rule{
    width:34px; height:2px; background:var(--emerald);
    box-shadow:0 0 8px var(--emerald);
  }
  .subtitle{
    font-family:'Space Grotesk', sans-serif;
    font-size:clamp(1.05rem, 1.6vw, 1.35rem);
    color:var(--dim); font-weight:500;
  }
  .subtitle b{ color:var(--paper); font-weight:600; }

  .desc{
    margin-top:24px;
    max-width:480px;
    color:var(--dim);
    font-size:15.5px;
    line-height:1.7;
  }

  .cta-row{ display:flex; gap:14px; margin-top:36px; flex-wrap:wrap; }
  .btn-primary{
    font-family:'Space Grotesk', sans-serif; font-weight:600; font-size:15px;
    background:linear-gradient(100deg, var(--emerald), #16875a);
    color:#03150c; padding:14px 26px; border-radius:10px;
    border:none; cursor:pointer;
    box-shadow:0 8px 24px rgba(31,163,102,0.4);
  }
  .btn-ghost{
    font-family:'JetBrains Mono', monospace; font-weight:500; font-size:13.5px;
    color:var(--mint); background:transparent;
    padding:14px 22px; border-radius:10px;
    border:1px solid rgba(125,255,196,0.35);
    letter-spacing:0.03em;
  }

  .stat-row{ display:flex; gap:34px; margin-top:44px; }
  .stat b{
    display:block; font-family:'Space Grotesk',sans-serif;
    font-size:1.5rem; color:var(--paper); font-weight:700;
  }
  .stat span{
    font-family:'JetBrains Mono', monospace; font-size:11px;
    color:var(--dim); letter-spacing:0.06em; text-transform:uppercase;
  }

  /* ---------- right column: portrait + terminal ---------- */
  .right-col{ position:relative; display:flex; flex-direction:column; align-items:center; gap:12px; }

  .portrait-ring{
    position:relative; width:150px; height:150px;
  }
  .ring-svg{ position:absolute; inset:0; width:100%; height:100%; animation:spin 22s linear infinite; }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  .portrait{
    position:absolute; inset:16px;
    border-radius:50%;
    overflow:hidden;
    border:3px solid rgba(125,255,196,0.5);
    box-shadow:0 0 0 8px rgba(31,163,102,0.08), 0 0 40px rgba(125,255,196,0.25);
    background:radial-gradient(circle at 50% 45%, #ffffff 0%, #f3fff8 68%, #e4f8ec 100%);
    display:flex; align-items:center; justify-content:center;
  }
  .portrait-logo{ width:74%; height:74%; object-fit:contain; }

  .node{
    position:absolute; width:11px; height:11px; border-radius:50%;
    box-shadow:0 0 10px currentColor;
    animation:pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse{ 0%,100%{ transform:scale(0.85); opacity:0.7;} 50%{ transform:scale(1.15); opacity:1;} }
  .n1{ top:0; left:50%; color:var(--dot-red); background:var(--dot-red); }
  .n2{ top:52%; right:-4px; color:var(--dot-blue); background:var(--dot-blue); animation-delay:.5s;}
  .n3{ bottom:2%; left:20%; color:var(--dot-purple); background:var(--dot-purple); animation-delay:1s;}
  .n4{ top:30%; left:-4px; color:var(--dot-lime); background:var(--dot-lime); animation-delay:1.5s;}

  .caption{
    font-family:'JetBrains Mono', monospace; font-size:12px; color:var(--dim);
    text-align:center; letter-spacing:0.04em;
  }
  .caption b{ color:var(--mint); }

  .terminal{
    width:210px;
    background:rgba(6,36,26,0.75);
    border:1px solid rgba(125,255,196,0.22);
    border-radius:12px;
    backdrop-filter:blur(6px);
    box-shadow:0 20px 50px rgba(0,0,0,0.35);
    overflow:hidden;
  }
  .term-head{
    display:flex; gap:6px; padding:10px 12px;
    background:rgba(255,255,255,0.03);
    border-bottom:1px solid rgba(125,255,196,0.12);
  }
  .term-head span{ width:9px; height:9px; border-radius:50%; }
  .term-head .r{ background:#e0505a;} .term-head .y{background:#e0c150;} .term-head .g{background:#5fd58a;}
  .term-body{
    padding:14px 16px 16px;
    font-family:'JetBrains Mono', monospace;
    font-size:12px; color:var(--mint); line-height:1.75;
  }
  .term-body .dim{ color:var(--dim); }
  .term-body .cur{
    display:inline-block; width:7px; height:13px; background:var(--mint);
    vertical-align:middle; animation:blink 1s step-end infinite;
  }

  @media (max-width:880px){
    .wrap{ grid-template-columns:1fr; padding:70px 24px; }
    .right-col{ order:-1; }
    .stat-row{ gap:24px; }
  }
</style>
</head>

<script>
  // generate binary rain columns
  const rain = document.getElementById('rain');
  rain.style.position='absolute'; rain.style.inset='0'; rain.style.zIndex='0'; rain.style.pointerEvents='none';
  const cols = 14;
  for(let i=0;i<cols;i++){
    const col = document.createElement('div');
    col.className='rain-col';
    col.style.left = (i*(100/cols) + (Math.random()*4)) + '%';
    col.style.animationDuration = (9 + Math.random()*8) + 's';
    col.style.animationDelay = (Math.random()*10) + 's';
    let str='';
    for(let j=0;j<26;j++){ str += (Math.random()>0.5?'1':'0') + '\n'; }
    col.textContent = str;
    rain.appendChild(col);
  }
</script>
